<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="Should I deploy today? A daily, themable music player that tells you whether it's a good day to ship.">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="img/coffee.png" type="image/x-icon">
    <title>Golden Today</title>
</head>

<body class="page">
    <!-- icons:start -->
    <!-- icons:end -->
    <main class="wrapper">
        <div class="top-bar">
            <div class="dropdown">
                <div class="row">
                    <svg class="material-symbols-rounded" id="dropdown-toggle" role="button" tabindex="0"
                        aria-label="Open links menu" aria-expanded="false"><use href="#ic-dropdown" /></svg>
                </div>
                <div class="dropdown-content">
                    <a href="https://github.com/dourado/today" target="_blank" rel="noopener noreferrer">GitHub</a>
                    <a href="https://www.linkedin.com/in/lucascdourado/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
                </div>
            </div>
            <span>Today</span>
            <div class="dark-mode" role="button" tabindex="0" aria-label="Toggle dark mode" aria-pressed="false">
                <svg class="material-symbols-rounded moon-light" aria-hidden="true" focusable="false"><use href="#ic-moon" /></svg>
                <svg class="material-symbols-rounded moon-dark" aria-hidden="true" focusable="false"><use href="#ic-moon" /></svg>
            </div>
        </div>
        <div class="img-area">
            <div class="text-area">
                <p id="message" aria-live="polite"></p>
            </div>
        </div>
        <div class="song-details">
            <p class="name"></p>
            <p class="artist"></p>
        </div>
        <div class="progress-area">
            <div class="progress-bar"></div>
            <div class="timer">
                <span class="current">0:00</span>
                <span class="duration"></span>
            </div>
            <audio id="main-audio" src="" preload="metadata"></audio>
        </div>
        <div class="controls">
            <svg id="repeat-plist" class="material-symbols-rounded" title="No Loop" role="button" tabindex="0"
                aria-label="Toggle song loop" aria-pressed="false"><use href="#ic-repeat" /></svg>
            <svg id="prev" class="material-symbols-rounded" role="button" tabindex="0" aria-label="Restart song"><use href="#ic-prev" /></svg>
            <div class="play-pause" role="button" tabindex="0" aria-label="Play or pause" aria-pressed="false">
                <svg class="material-symbols-rounded icon-play" aria-hidden="true" focusable="false"><use href="#ic-play" /></svg>
                <svg class="material-symbols-rounded icon-pause" aria-hidden="true" focusable="false"><use href="#ic-pause" /></svg>
            </div>
            <svg id="next" class="material-symbols-rounded" role="button" tabindex="0" aria-label="Restart song"><use href="#ic-next" /></svg>
            <svg id="more-music" class="material-symbols-rounded" role="button" tabindex="0" aria-label="Show playlist" aria-expanded="false"><use href="#ic-playlist" /></svg>
        </div>
        <div class="music-list">
            <div class="header">
                <div class="row">
                    <svg class="material-symbols-rounded" aria-hidden="true" focusable="false"><use href="#ic-playlist" /></svg>
                    <span class="title-music">Tomorrow</span>
                </div>
                <svg id="close" class="material-symbols-rounded" role="button" tabindex="0" aria-label="Close playlist"><use href="#ic-close" /></svg>
            </div>
            <ul>
                <!-- Song list -->
            </ul>
        </div>
    </main>
    <script src="js/music-list.js"></script>
    <script src="js/script.js"></script>
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <script>
        window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</body>

</html>
