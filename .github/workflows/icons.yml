name: Icons

# Keeps the inline SVG icon sprite in src/index.html in sync with
# icons.config.json. The sprite is regenerated by scripts/build-icons.mjs from
# the pinned Material Symbols version ("version" in icons.config.json).
#
# - push (feature branches): regenerate and commit the sprite back to the
#   branch, so editing icons.config.json auto-updates the sprite in your PR.
# - workflow_dispatch / schedule: check upstream for a newer release; bump the
#   pin and open a PR ONLY when that release actually changes one of our icons.
#   The workflow never pushes to the protected default branch.

on:
  push:
    branches-ignore:
      - main
    paths:
      - icons.config.json
      - scripts/build-icons.mjs
  workflow_dispatch:
  schedule:
    # Weekly upstream refresh (Mondays, off-peak) — almost always a no-op.
    - cron: "17 4 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  sprite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      # Feature-branch push: regenerate from the pinned version and commit the
      # sprite back to the branch.
      - name: Regenerate sprite
        if: github.event_name == 'push'
        run: |
          node scripts/build-icons.mjs
          version=$(node -p "require('./icons.config.json').version")
          {
            echo "## Icon sprite regenerated"
            echo
            echo "Rebuilt the inline SVG sprite in \`src/index.html\` from the pinned Material Symbols version (\`$version\`)."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit sprite to the branch
        if: github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore(icons): regenerate inline SVG sprite"
          file_pattern: src/index.html

      # Manual / scheduled: bump the pin to the latest release and regenerate.
      # @material-symbols publishes often but rarely touches our 9 icons, so we
      # only keep the bump (and open a PR) when the sprite actually differs.
      - name: Check upstream and regenerate if our icons changed
        id: regen
        if: github.event_name != 'push'
        run: |
          set -euo pipefail
          pinned=$(jq -r '.version' icons.config.json)
          pkg=$(jq -r '.package' icons.config.json)
          latest=$(curl -fsSL "https://registry.npmjs.org/$pkg" | jq -r '."dist-tags".latest')
          echo "pinned=$pinned latest=$latest"
          {
            echo "## Material Symbols sync"
            echo
            echo "- Package: \`$pkg\`"
            echo "- Pinned: \`$pinned\`"
            echo "- Latest on npm: \`$latest\`"
          } >> "$GITHUB_STEP_SUMMARY"
          # Skip cleanly on anything that isn't a plain x.y.z release (a missing
          # dist-tag yields "null"; pre-releases like 0.46.0-rc.1 would break the
          # pinned build), rather than writing it into the config and failing.
          if ! printf '%s' "$latest" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Registry returned an unexpected latest ('$latest'); leaving the pin at v$pinned."
            echo "- Result: ⚠️ registry returned an unexpected \`latest\`; pin left at \`$pinned\`." >> "$GITHUB_STEP_SUMMARY"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$latest" = "$pinned" ]; then
            echo "Already on the latest version."
            echo "- Result: ✅ already on the latest release; nothing to do." >> "$GITHUB_STEP_SUMMARY"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          jq --arg v "$latest" '.version = $v' icons.config.json > icons.config.json.tmp
          mv icons.config.json.tmp icons.config.json
          node scripts/build-icons.mjs
          if git diff --quiet -- src/index.html; then
            echo "v$latest doesn't change our icons; leaving the pin at v$pinned."
            git checkout -- icons.config.json
            echo "- Result: ✅ v\`$latest\` doesn't change our icons; pin stays at \`$pinned\`." >> "$GITHUB_STEP_SUMMARY"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "v$latest changes the sprite; bumping the pin."
            echo "- Result: 🔄 v\`$latest\` changes the sprite; bumping the pin and opening a PR." >> "$GITHUB_STEP_SUMMARY"
            echo "version=$latest" >> "$GITHUB_OUTPUT"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR with the bumped pin and refreshed sprite
        if: github.event_name != 'push' && steps.regen.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: icons/sync-sprite
          title: "chore(icons): bump Material Symbols to v${{ steps.regen.outputs.version }}"
          commit-message: "chore(icons): bump Material Symbols to v${{ steps.regen.outputs.version }}"
          body: |
            A new `@material-symbols/svg-400` release changed one of the icons in
            `icons.config.json`. Bumped the pin to v${{ steps.regen.outputs.version }}
            and regenerated the `src/index.html` sprite.
          assignees: dourado
          add-paths: |
            icons.config.json
            src/index.html
