name: Icons

# Keeps the inline SVG icon sprite in src/index.html in sync with
# icons.config.json. The sprite is regenerated by scripts/build-icons.mjs.
#
# - push (feature branches): regenerate and commit the sprite back to the
#   branch, so editing icons.config.json auto-updates the sprite in your PR.
# - workflow_dispatch / schedule: regenerate from upstream and open a PR if the
#   drawing changed. The workflow never pushes to the protected default branch.

on:
  push:
    branches-ignore:
      - main
    paths:
      - icons.config.json
      - scripts/build-icons.mjs
  workflow_dispatch:
  schedule:
    # Weekly upstream refresh (Mondays, off-peak) — almost always a no-op.
    - cron: "17 4 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  sprite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Regenerate sprite
        run: node scripts/build-icons.mjs

      # Feature-branch push: commit the regenerated sprite back to the branch.
      - name: Commit sprite to the branch
        if: github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore(icons): regenerate inline SVG sprite"
          file_pattern: src/index.html

      # Manual / scheduled: open a PR instead (default branch is protected).
      - name: Open PR with the refreshed sprite
        if: github.event_name != 'push'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: icons/sync-sprite
          title: "chore(icons): sync inline SVG sprite"
          commit-message: "chore(icons): sync inline SVG sprite"
          body: |
            Regenerated the `src/index.html` icon sprite from `icons.config.json`
            via the Icons workflow.
          assignees: dourado
          add-paths: src/index.html
